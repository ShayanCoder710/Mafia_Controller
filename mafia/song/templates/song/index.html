{% extends 'base.html' %}
{% load static %}


{% block main %}

<div class="container">
    <form method="post" action="" class="mafia song_player">
        {% csrf_token %}
        <select name="song" id="select_song">
            {% for i in songs %}
            <option value="{{ i.name }}" {% if i == song %}  selected {% endif %}>{{ i.name }}</option>
            {% endfor %}
        </select>
        <div class="btns">
        <button type="button" class="btn play">play</button>
        <button type="submit" class="btn save">save</button>
        </div>
        <audio  class="player" src="{{ song.song.url }}"allow="autoplay" ></audio>
    </form>
    <div class="mafia timer one">
        <div class="timer_num">
            <p>0</p>
        </div>
        <div class="btns">
            <button>play</button>
            <button>stop</button>
            
        </div>
    </div>
</div>
<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
