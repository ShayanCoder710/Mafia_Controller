{% extends 'base.html' %}

{% block main %}
<div class="container">
    <form method="post" action="" class="song_player">
        <select name="song" id="select_song">
            {% for i in songs %}
            <option value="{{ i.song.url }}">{{ i.name }}</option>
            {% endfor %}
        </select>
        <audio src="{{ song.song.url }}"type="audio/mpeg"></audio>
    </form>
</div>

{% endblock %}
